<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кофейня — Анимация банки</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow-x: hidden;
        }
        .screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* Стили для картинки с фотостока */
        #coffee-can {
            width: 300px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="screen">
        <h1>Листай вниз 👇</h1>
    </div>

    <div class="container">
        <img id="coffee-can" src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?q=80&w=600&auto=format&fit=crop" alt="Банка кофе">
    </div>

    <div class="screen">
        <h2>Конец анимации 🔥</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Активируем плагин скролла
        gsap.registerPlugin(ScrollTrigger);

        // Настройка движения банки
        gsap.to("#coffee-can", {
            x: 200,          // Движение вправо
            rotation: 360,   // Поворот вокруг оси
            scale: 1.2,      // Увеличение размера
            scrollTrigger: {
                trigger: "#coffee-can",
                start: "top 80%",  // Старт, когда показался низ банки
                end: "top 20%",    // Конец, когда дошли до верха экрана
                scrub: true        // Привязка движения к пальцу/колесику
            }
        });
    </script>

</body>
</html>
