<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кофейня — Мобильная анимация</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow-x: hidden;
        }
        .screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            height: 100vh;
            display: flex;
            align-items: flex-end; /* Банка изначально внизу экрана */
            justify-content: center;
            position: relative;
            padding-bottom: 10vh;
            box-sizing: border-box;
        }
        /* Адаптивный размер банки под мобильные экраны */
        #coffee-can {
            width: 70vw; /* Процент от ширины экрана */
            max-width: 280px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <div class="screen">
        <h1>Листай вниз 👇</h1>
    </div>

    <div class="container">
        <img id="coffee-can" src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?q=80&w=600&auto=format&fit=crop" alt="Банка кофе">
    </div>

    <div class="screen">
        <h2>Идеально для телефона 🔥</h2>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Мобильная анимация: движение вверх и аккуратный поворот
        gsap.to("#coffee-can", {
            y: "-30vh",       // Сдвиг вверх на 30% высоты экрана
            rotation: 45,     // Легкий наклон вместо жесткого кручения
            scale: 0.9,       // Чуть уменьшаем, чтобы влез текст
            scrollTrigger: {
                trigger: ".container",
                start: "top bottom", // Начинаем, как только контейнер показался снизу
                end: "bottom top",   // Закругляемся, когда он ушел наверх
                scrub: true          // Идеальный отклик под палец
            }
        });
    </script>

</body>
</html>
